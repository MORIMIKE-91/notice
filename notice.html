<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Important Update</title>

    <style>
        :root {
            --blue1: #23b9ff;
            --blue2: #126bff;
            --ink: #0b1633;
            --text: #0f234d;
            --muted: rgba(16, 38, 80, .62);
            --stroke: rgba(255, 255, 255, .95);
            --stroke2: rgba(0, 160, 255, .35);
            --shadow: 0 22px 60px rgba(0, 0, 0, .35);
            --radiusLg: 34px;
            --btnG1: #2de29b;
            --btnG2: #0fb27f;
            --warn: #ffd36a;
            --pink: #ff5e86;
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
            background: #0b1020;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: manipulation;
        }

        /* Background */
        .bg {
            position: fixed;
            inset: 0;
            background: url("https://morimike-91.github.io/notice/assets/bg.png") center/cover no-repeat;
            filter: blur(6px);
            transform: scale(1.06);
        }

        .dim {
            position: fixed;
            inset: 0;
            background: rgba(0, 16, 30, .55);
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center,
                    rgba(120, 220, 255, .18) 0%,
                    rgba(0, 0, 0, .25) 55%,
                    rgba(0, 0, 0, .55) 100%);
            pointer-events: none;
        }

        /* Fullscreen overlay */
        .overlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100dvh;
            display: grid;
            place-items: center;
            padding:
                calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
        }

        .scale-wrap {
            transform-origin: center;
            will-change: transform;
        }

        /* Modal */
        .modal {
            width: min(980px, 92vw);
            max-height: calc(100dvh - 20px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            border-radius: var(--radiusLg);
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, .96) 0%,
                    rgba(235, 246, 255, .92) 55%,
                    rgba(210, 238, 255, .90) 100%);
            box-shadow: var(--shadow);
            border: 4px solid var(--stroke);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal::after {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: calc(var(--radiusLg) - 10px);
            border: 3px solid var(--stroke2);
            pointer-events: none;
        }

        .gloss {
            position: absolute;
            inset: -30%;
            background: repeating-linear-gradient(-12deg,
                    rgba(255, 255, 255, .08) 0 14px,
                    rgba(255, 255, 255, 0) 14px 46px);
            pointer-events: none;
            opacity: .85;
        }

        /* Banner */
        .banner {
            margin: 16px;
            padding: 14px 16px;
            border-radius: 22px;
            background: linear-gradient(180deg, var(--blue1), var(--blue2));
            border: 4px solid rgba(255, 255, 255, .92);
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 0 0 auto;
        }

        .banner::before {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            top: 10px;
            height: 48%;
            border-radius: 18px;
            background: rgba(255, 255, 255, .18);
            pointer-events: none;
        }

        .banner h1 {
            margin: 0;
            font-size: clamp(16px, 2.8vw, 28px);
            letter-spacing: .6px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 2px 0 rgba(0, 0, 0, .15);
        }

        /* Content */
        .content {
            display: grid;
            grid-template-columns: 1.25fr .75fr;
            gap: 18px;
            padding: 6px 18px 8px;
            align-items: center;
            flex: 1 1 auto;
            min-height: 0;
        }

        .left h2 {
            margin: 8px 0 6px;
            font-size: clamp(18px, 3vw, 40px);
            color: var(--ink);
        }

        .left p {
            margin: 8px 0;
            font-size: clamp(13px, 2vw, 18px);
            line-height: 1.4;
            color: rgba(16, 38, 80, .82);
        }

        .pill {
            display: inline-flex;
            align-items: center;
            padding: 9px 13px;
            border-radius: 999px;
            background: var(--warn);
            border: 2px solid rgba(255, 255, 255, .9);
            color: #2b1f0d;
            font-weight: 900;
            letter-spacing: .4px;
            margin: 6px 0 4px;
            white-space: nowrap;
            font-size: 14px;
        }

        /* Icon bubble */
        .right {
            display: flex;
            justify-content: center;
        }

        .bubble {
            position: relative;
            width: clamp(150px, 24vw, 250px);
            aspect-ratio: 1/1;
            border-radius: 999px;
            background: rgba(255, 255, 255, .92);
            border: 5px solid rgba(255, 255, 255, .95);
            box-shadow: 0 18px 40px rgba(0, 0, 0, .18);
            display: grid;
            place-items: center;
            overflow: hidden;
        }

        .bubble::before {
            content: "";
            position: absolute;
            inset: 12px;
            border-radius: 999px;
            border: 4px solid rgba(0, 160, 255, .25);
            pointer-events: none;
            z-index: 1;
        }

        .bubble::after {
            content: "";
            position: absolute;
            inset: 16px;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(140, 230, 255, .95), rgba(25, 105, 255, .95));
            opacity: .95;
            z-index: 0;
        }

        .icon {
            position: relative;
            width: 68%;
            aspect-ratio: 1/1;
            border-radius: 22%;
            overflow: hidden;
            z-index: 2;
            box-shadow: 0 14px 26px rgba(0, 0, 0, .22);
            border: 4px solid rgba(255, 255, 255, .92);
            background: #fff;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #fff;
        }

        .tag {
            position: absolute;
            right: 10px;
            top: 14px;
            z-index: 3;
            background: var(--pink);
            color: #fff;
            font-weight: 900;
            padding: 7px 12px;
            border-radius: 999px;
            transform: rotate(-12deg);
            border: 3px solid rgba(255, 255, 255, .9);
            box-shadow: 0 10px 18px rgba(0, 0, 0, .18);
            letter-spacing: .5px;
            font-size: 13px;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px 16px 14px;
            flex: 0 0 auto;
        }

        .btn {
            height: 58px;
            border-radius: 18px;
            padding: 0 22px;
            border: none;
            cursor: pointer;
            font-weight: 900;
            letter-spacing: .2px;
            font-size: 18px;
        }

        .primary {
            min-width: 320px;
            color: #fff;
            background: linear-gradient(180deg, var(--btnG1), var(--btnG2));
            border: 4px solid rgba(255, 255, 255, .92);
            box-shadow: 0 14px 26px rgba(0, 0, 0, .18);
            position: relative;
        }

        .primary::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            top: 10px;
            height: 45%;
            border-radius: 14px;
            background: rgba(255, 255, 255, .18);
            pointer-events: none;
        }

        .secondary {
            min-width: 180px;
            color: rgba(20, 110, 200, .95);
            background: rgba(255, 255, 255, .78);
            border: 3px solid rgba(0, 160, 255, .35);
        }

        .foot {
            text-align: center;
            padding: 0 16px 14px;
            color: rgba(16, 38, 80, .55);
            font-size: 13px;
            flex: 0 0 auto;
        }

        /* ✅ iPhone X landscape / small height: prevent overlap */
        @media (max-height: 430px) {
            .banner {
                margin: 12px;
                padding: 12px 14px
            }

            .content {
                padding: 4px 14px 6px;
                gap: 12px
            }

            .left h2 {
                margin: 6px 0 4px
            }

            .left p {
                margin: 6px 0;
                line-height: 1.22
            }

            .secondaryText {
                display: none;
            }

            /* hide the long “Already installed?” line */
            .foot {
                display: none;
            }

            /* remove footer in tiny height */
            .btn {
                height: 52px;
                font-size: 16px
            }

            .primary {
                min-width: 240px
            }

            .secondary {
                min-width: 150px
            }

            .bubble {
                width: clamp(130px, 22vw, 210px)
            }

            .actions {
                padding: 6px 14px 10px
            }
        }

        @media (max-width: 720px) {
            .content {
                grid-template-columns: 1fr
            }

            .right {
                justify-content: center
            }

            /* on narrow phones, stack buttons so nothing covers anything */
            .actions {
                flex-direction: column
            }

            .primary,
            .secondary {
                width: min(520px, 88vw);
                min-width: 0
            }
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div class="dim"></div>
    <div class="vignette"></div>

    <div class="overlay">
        <div class="scale-wrap" id="scaleWrap">
            <div class="modal" id="modal">
                <div class="gloss"></div>

                <div class="banner">
                    <svg width="40" height="40" viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M32 6 L6 58 H58 Z" fill="#FFD36A" stroke="white" stroke-width="4" />
                        <text x="32" y="46" text-anchor="middle" font-size="40" font-weight="900" fill="#2b1f0d">!</text>
                    </svg>
                    <h1>Move to new version</h1>
                </div>

                <div class="content">
                    <div class="left">
                        <h2>This app will be retired soon.</h2>
                        <div class="pill"><span id="daysLeft">1 DAY LEFT</span></div>

                        <p>
                            To keep your <b>map</b> and <b>characters</b>, please install the
                            <b>new version</b> from the App Store.
                        </p>

                        <p class="secondaryText" style="color: var(--muted);">
                            Already installed? Open the new app and sign in with the same account to restore progress.
                        </p>
                    </div>

                    <div class="right">
                        <div class="bubble">
                            <div class="tag">NEW</div>
                            <div class="icon">
                                <img src="https://morimike-91.github.io/notice/assets/stealico.png" alt="New version icon" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn primary" onclick="goToNewApp()">Get the new app</button>
                    <button class="btn secondary" onclick="later()">Later</button>
                </div>

                <div class="foot">You can continue playing in the new app.</div>
            </div>
        </div>
    </div>

    <script>
        const NEW_APP_URL = "https://apps.apple.com/us/app/steal-a-golden-fish/id6753191621";
        const GAME_URL = "https://playhop.com/dist-app/447574?header=no&skip-guard=1&utm_source=parent_window_api&utm_medium=playgama&flags={%22adv_types_disabled%22:16}";

        function goToNewApp() {
            // If using UniWebView external open:
            // location.href = "uniwebview://open?url=" + encodeURIComponent(NEW_APP_URL);
            window.location.href = NEW_APP_URL;
        }

        function later() {
            window.location.href = GAME_URL;
        }

        // Countdown
        const KEY = "retire_start";
        const start = Number(localStorage.getItem(KEY)) || Date.now();
        localStorage.setItem(KEY, String(start));
        const end = start + 5 * 24 * 60 * 60 * 1000;

        function tick() {
            const ms = end - Date.now();
            const days = Math.max(0, Math.ceil(ms / (24 * 60 * 60 * 1000)));
            document.getElementById("daysLeft").textContent = days + " DAYS LEFT";
        }
        tick();
        setInterval(tick, 30000);

        // Fit to iPhone X + all iOS (prevents clipping)
        function fitNoClip() {
            const wrap = document.getElementById("scaleWrap");
            const modal = document.getElementById("modal");
            wrap.style.transform = "scale(1)";

            const vv = window.visualViewport;
            const vh = vv ? vv.height : window.innerHeight;
            const vw = vv ? vv.width : window.innerWidth;

            const rect = modal.getBoundingClientRect();
            const pad = 18;

            const sH = (vh - pad) / rect.height;
            const sW = (vw - pad) / rect.width;
            const s = Math.min(1, sH, sW);

            wrap.style.transform = `scale(${Math.max(0.75, s)})`;
        }

        window.addEventListener("load", () => {
            fitNoClip();
            setTimeout(fitNoClip, 150);
            setTimeout(fitNoClip, 450);
        });
        window.addEventListener("resize", fitNoClip);
        window.addEventListener("orientationchange", () => setTimeout(fitNoClip, 250));
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", fitNoClip);
            window.visualViewport.addEventListener("scroll", fitNoClip);
        }
    </script>
</body>

</html>
